<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>달력 TODO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <header class="topbar">
      <div class="topbar__inner topbar__inner--split">
        <div class="brand">
          <div class="brand__logo" aria-hidden="true">✓</div>
          <div class="brand__text">
            <div class="brand__title">달력 TODO</div>
            <div class="brand__subtitle">날짜를 클릭해 할 일을 관리하고 태그로 필터링하세요</div>
          </div>
        </div>
        <button type="button" class="topbarActionBtn" id="resetAllBtn">전체 일정 초기화</button>
      </div>
    </header>

    <main class="container">
      <section class="stack">
        <div class="card calendarCard" aria-label="달력">
          <div class="card__header card__header--calendar">
            <div class="calHeader">
              <div class="calHeaderLeft">
                <div class="calYearRow">
                  <button type="button" class="calYear" id="yearLabel" title="연도 선택">2026년</button>
                  <button type="button" class="calToolbarBtn" id="clearCompletedBtn">완료된 일정 삭제</button>
                </div>
              </div>
              <div class="calHeaderCenter">
                <button class="calNavBtn" id="prevMonthBtn" type="button" title="이전 달" aria-label="이전 달">
                  &lt;
                </button>
                <button type="button" class="calNavBtn calMonthBtn" id="monthBtn" aria-live="polite">
                  4월
                </button>
                <button class="calNavBtn" id="nextMonthBtn" type="button" title="다음 달" aria-label="다음 달">
                  &gt;
                </button>
              </div>
            <div class="pill todayPill" id="todayPill">
              <span class="todayPill__weather" id="todayWeatherIcon" aria-hidden="true">☁️</span>
              <span class="todayPill__temp" id="todayTempText">--°</span>
              <span class="todayPill__sep" aria-hidden="true">·</span>
              <span class="todayPill__label">오늘</span>
              <span class="todayPill__md" id="todayMdText">4월 3일</span>
              <span class="todayPill__time" id="todayTimeText">--:--</span>
            </div>
            </div>
          </div>

          <div class="calendar" id="calendar" aria-label="이번 달 달력">
            <!-- Filled by script.js -->
          </div>
        </div>

        <div class="card todoCard" aria-label="할 일">
          <div class="card__header todoPanel__head">
            <div class="todoCard__titleBlock">
              <div class="card__title">✔️ 할 일</div>
              <div class="card__hint" id="todoHint">날짜를 선택하면 할 일이 보여요</div>
            </div>
            <div class="filterBar filterBar--stack" aria-label="필터">
              <div class="filterRow">
                <span class="filterRow__label">날짜</span>
                <div class="filterSeg" id="filterDateSeg" role="group" aria-label="날짜 범위">
                  <button type="button" class="filterSeg__btn filterSeg__btn--active" data-date-scope="today">오늘</button>
                  <button type="button" class="filterSeg__btn" data-date-scope="month" id="filterDateMonthBtn">4월</button>
                  <button type="button" class="filterSeg__btn" data-date-scope="year" id="filterDateYearBtn">26년</button>
                </div>
              </div>
              <div class="filterRow">
                <span class="filterRow__label">종류</span>
                <div class="filterSeg" id="filterCatSeg" role="group" aria-label="할 일 종류">
                  <button type="button" class="filterSeg__btn filterSeg__btn--active" data-cat-filter="all">전체</button>
                  <button type="button" class="filterSeg__btn" data-cat-filter="할일">할일</button>
                  <button type="button" class="filterSeg__btn" data-cat-filter="약속">약속</button>
                  <button type="button" class="filterSeg__btn" data-cat-filter="생일">생일</button>
                </div>
              </div>
            </div>
          </div>

          <form class="todoForm todoForm--inline" id="todoForm" autocomplete="off">
            <label class="field field--todoText">
              <span class="field__label">할일 추가</span>
              <input
                class="field__input"
                id="todoText"
                type="text"
                placeholder="예: 장보기"
                maxlength="120"
                required
              />
            </label>

            <label class="field field--fixed">
              <span class="field__label">종류</span>
              <select class="field__input" id="todoCategory">
                <option value="약속">약속</option>
                <option value="생일">생일</option>
                <option value="할일" selected>할일</option>
              </select>
            </label>

            <label class="field field--fixed">
              <span class="field__label">반복</span>
              <select class="field__input" id="todoRepeat">
                <option value="none" selected>반복 없음</option>
                <option value="daily">매일</option>
                <option value="weekly">매주</option>
                <option value="yearly">매년</option>
              </select>
            </label>

            <button class="btn todoForm__addBtn" type="submit" id="addBtn" disabled>추가</button>
          </form>

          <div class="todoList" id="todoList" aria-live="polite">
            <!-- Filled by script.js -->
          </div>
        </div>
      </section>
    </main>

    <div class="miniPicker" id="yearPicker" hidden role="dialog" aria-modal="true" aria-labelledby="yearPickerTitle">
      <button type="button" class="miniPicker__backdrop" id="yearPickerBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel">
        <div class="miniPicker__title" id="yearPickerTitle">연도 선택</div>
        <div class="yearPickerRow">
          <button type="button" class="calNavBtn calNavBtn--ghost" id="yearMinus" aria-label="1년 이전">−</button>
          <input type="number" class="yearInput" id="yearInput" min="1900" max="2100" step="1" />
          <button type="button" class="calNavBtn calNavBtn--ghost" id="yearPlus" aria-label="1년 다음">+</button>
        </div>
        <button type="button" class="btn btn--block" id="yearApplyBtn">확인</button>
      </div>
    </div>

    <div class="miniPicker" id="monthPicker" hidden role="dialog" aria-modal="true" aria-labelledby="monthPickerTitle">
      <button type="button" class="miniPicker__backdrop" id="monthPickerBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel">
        <div class="miniPicker__title" id="monthPickerTitle">월 선택</div>
        <div class="miniPicker__grid" id="monthPickerGrid"></div>
      </div>
    </div>

    <div class="miniPicker" id="deleteConfirm" hidden role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
      <button type="button" class="miniPicker__backdrop" id="deleteConfirmBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel confirmPanel">
        <div class="miniPicker__title" id="deleteConfirmTitle">할 일 삭제</div>
        <p class="confirmPanel__msg">삭제하시겠습니까?</p>
        <label class="confirmPanel__skip" id="deleteConfirmSkipWrap">
          <input type="checkbox" id="deleteConfirmSkip" />
          <span>7일간 다시 표시 안 함</span>
        </label>
        <div class="confirmPanel__actions confirmPanel__actions--yesno">
          <button type="button" class="btn btn--ghost" id="deleteConfirmNo">아니오</button>
          <button type="button" class="btn btn--danger" id="deleteConfirmDelete">삭제</button>
        </div>
      </div>
    </div>

    <div class="miniPicker" id="deleteRepeatConfirm" hidden role="dialog" aria-modal="true" aria-labelledby="deleteRepeatTitle">
      <button type="button" class="miniPicker__backdrop" id="deleteRepeatBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel confirmPanel">
        <div class="miniPicker__title" id="deleteRepeatTitle">반복 할 일 삭제</div>
        <p class="confirmPanel__msg confirmPanel__msg--multiline">
          반복설정된 할일 입니다.<br />
          선택된 할일만 삭제하시겠습니까?
        </p>
        <label class="confirmPanel__skip">
          <input type="checkbox" id="deleteRepeatAll" />
          <span>반복 일정 모두 삭제</span>
        </label>
        <div class="confirmPanel__actions confirmPanel__actions--yesno">
          <button type="button" class="btn btn--ghost" id="deleteRepeatNo">아니오</button>
          <button type="button" class="btn btn--danger" id="deleteRepeatDelete">삭제</button>
        </div>
      </div>
    </div>

    <div class="miniPicker" id="resetAllConfirm" hidden role="dialog" aria-modal="true" aria-labelledby="resetAllTitle">
      <button type="button" class="miniPicker__backdrop" id="resetAllBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel confirmPanel">
        <div class="miniPicker__title" id="resetAllTitle">전체 일정 초기화</div>
        <p class="confirmPanel__msg">정말로 전체 일정 초기화하겠습니까?</p>
        <div class="confirmPanel__actions confirmPanel__actions--yesno">
          <button type="button" class="btn btn--ghost" id="resetAllNo">아니오</button>
          <button type="button" class="btn btn--danger" id="resetAllYes">예</button>
        </div>
      </div>
    </div>

    <div class="miniPicker" id="clearCompletedConfirm" hidden role="dialog" aria-modal="true" aria-labelledby="clearCompletedTitle">
      <button type="button" class="miniPicker__backdrop" id="clearCompletedBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel confirmPanel">
        <div class="miniPicker__title" id="clearCompletedTitle">완료된 일정 삭제</div>
        <p class="confirmPanel__msg">완료된 일정을 삭제하시겠습니까?</p>
        <div class="confirmPanel__actions confirmPanel__actions--yesno">
          <button type="button" class="btn btn--ghost" id="clearCompletedNo">아니오</button>
          <button type="button" class="btn btn--danger" id="clearCompletedYes">예</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer__inner">
        <span>Firebase DB에 저장 및 동기화됩니다.</span>
      </div>
    </footer>

    <!-- Firebase (Realtime Database) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="script.js"></script>
  </body>
</html>
