<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>달력 TODO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <div class="brand__logo" aria-hidden="true">✓</div>
          <div class="brand__text">
            <div class="brand__title">달력 TODO</div>
            <div class="brand__subtitle">날짜를 클릭해 할 일을 관리하고 태그로 필터링하세요</div>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="stack">
        <div class="card calendarCard" aria-label="달력">
          <div class="card__header card__header--calendar">
            <div class="calHeader">
              <button type="button" class="calYear" id="yearLabel" title="연도 선택">2026년</button>
              <div class="calHeaderCenter">
                <button class="calNavBtn" id="prevMonthBtn" type="button" title="이전 달" aria-label="이전 달">
                  &lt;
                </button>
                <button type="button" class="calNavBtn calMonthBtn" id="monthBtn" aria-live="polite">
                  4월
                </button>
                <button class="calNavBtn" id="nextMonthBtn" type="button" title="다음 달" aria-label="다음 달">
                  &gt;
                </button>
              </div>
            <div class="pill todayPill" id="todayPill">
              <span class="todayPill__weather" id="todayWeatherIcon" aria-hidden="true">☁️</span>
              <span class="todayPill__temp" id="todayTempText">--°</span>
              <span class="todayPill__sep" aria-hidden="true">·</span>
              <span class="todayPill__label">오늘</span>
              <span class="todayPill__md" id="todayMdText">4월 3일</span>
              <span class="todayPill__time" id="todayTimeText">--:--</span>
            </div>
            </div>
          </div>

          <div class="calendar" id="calendar" aria-label="이번 달 달력">
            <!-- Filled by script.js -->
          </div>
        </div>

        <div class="card todoCard" aria-label="할 일">
          <div class="card__header todoPanel__head">
            <div class="todoCard__titleBlock">
              <div class="card__title">✔️ 할 일</div>
              <div class="card__hint" id="todoHint">날짜를 선택하면 할 일이 보여요</div>
            </div>
            <div class="filterBar" aria-label="필터">
              <button class="chip chip--active" id="filterAll" type="button">전체</button>
              <button class="chip" id="filterAppt" type="button">약속</button>
              <button class="chip" id="filterBday" type="button">생일</button>
              <button class="chip" id="filterTodo" type="button">할일</button>
            </div>
          </div>

          <form class="todoForm" id="todoForm" autocomplete="off">
            <label class="field">
              <span class="field__label">할일 추가</span>
              <input
                class="field__input"
                id="todoText"
                type="text"
                placeholder="예: 장보기"
                maxlength="120"
                required
              />
            </label>

            <label class="field">
              <span class="field__label">종류</span>
              <select class="field__input" id="todoCategory">
                <option value="약속">약속</option>
                <option value="생일">생일</option>
                <option value="할일" selected>할일</option>
              </select>
            </label>

            <button class="btn" type="submit" id="addBtn" disabled>추가</button>
          </form>

          <div class="todoList" id="todoList" aria-live="polite">
            <!-- Filled by script.js -->
          </div>
        </div>
      </section>
    </main>

    <div class="miniPicker" id="yearPicker" hidden role="dialog" aria-modal="true" aria-labelledby="yearPickerTitle">
      <button type="button" class="miniPicker__backdrop" id="yearPickerBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel">
        <div class="miniPicker__title" id="yearPickerTitle">연도 선택</div>
        <div class="yearPickerRow">
          <button type="button" class="calNavBtn calNavBtn--ghost" id="yearMinus" aria-label="1년 이전">−</button>
          <input type="number" class="yearInput" id="yearInput" min="1900" max="2100" step="1" />
          <button type="button" class="calNavBtn calNavBtn--ghost" id="yearPlus" aria-label="1년 다음">+</button>
        </div>
        <button type="button" class="btn btn--block" id="yearApplyBtn">확인</button>
      </div>
    </div>

    <div class="miniPicker" id="monthPicker" hidden role="dialog" aria-modal="true" aria-labelledby="monthPickerTitle">
      <button type="button" class="miniPicker__backdrop" id="monthPickerBackdrop" aria-label="닫기"></button>
      <div class="miniPicker__panel">
        <div class="miniPicker__title" id="monthPickerTitle">월 선택</div>
        <div class="miniPicker__grid" id="monthPickerGrid"></div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer__inner">
        <span>Firebase DB에 저장 및 동기화됩니다.</span>
      </div>
    </footer>

    <!-- Firebase (Realtime Database) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="script.js"></script>
  </body>
</html>
